services:
  - type: web
    name: smart-expense-tracker-api
    runtime: python
    buildCommand: apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 75
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0